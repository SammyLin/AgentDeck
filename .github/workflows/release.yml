name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag and package version
        shell: bash
        run: ./scripts/release-check.sh "${GITHUB_REF_NAME}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch="x86_64" ;;
            arm64|aarch64) arch="aarch64" ;;
            *) echo "unsupported arch: $arch" >&2; exit 1 ;;
          esac
          asset="agentdeck-${os}-${arch}"
          mkdir -p "dist/$asset"
          cp target/release/agentdeck "dist/$asset/agentdeck"
          tar -C "dist/$asset" -czf "dist/$asset.tar.gz" agentdeck
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/$asset.tar.gz" > "dist/$asset.tar.gz.sha256"
          else
            sha256sum "dist/$asset.tar.gz" > "dist/$asset.tar.gz.sha256"
          fi

      - name: Attest release archive
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.tar.gz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
